
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: regraph
      POSTGRES_USER: rguser
      POSTGRES_PASSWORD: rgpass123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rguser -d regraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  api:
    build: ./services/api
    ports:
      - "8001:8000"

    environment:
      - DATABASE_URL=postgresql+asyncpg://rguser:rgpass123@postgres:5432/regraph
      - SYNC_DATABASE_URL=postgresql://rguser:rgpass123@postgres:5432/regraph
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONPATH=/app

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    volumes:
      - .:/app

    working_dir: /app/services/api

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  scheduler:
    build: ./services/api

    environment:
      - DATABASE_URL=postgresql+asyncpg://rguser:rgpass123@postgres:5432/regraph
      - SYNC_DATABASE_URL=postgresql://rguser:rgpass123@postgres:5432/regraph
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONPATH=/app

    volumes:
      - .:/app

    working_dir: /app/services/api

    command: python -c "import sys; sys.path.insert(0, '/app'); from services.scheduler.polling_jobs import SchedulerJobs; from websocket.retrigger_ws import manager; from services.knowledge.obligation_graph.graph_builder import ObligationGraphBuilder; builder = ObligationGraphBuilder(); builder.build_graph(); s = SchedulerJobs(builder, manager); s.start(); import asyncio; asyncio.get_event_loop().run_forever()"

    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data: