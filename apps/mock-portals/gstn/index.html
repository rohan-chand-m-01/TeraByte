<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSTN Regulatory Portal (Mock)</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #f7faf5; color: #1f3a1f; }
      h1 { color: #355e3b; }
      .note { background: #e6f2dd; border-left: 4px solid #5b8c5a; padding: 10px; margin: 16px 0; }
      table { border-collapse: collapse; width: 100%; background: #fff; }
      th, td { border: 1px solid #c8d8c0; padding: 8px; text-align: left; font-size: 14px; }
      th { background: #d3e6cb; color: #234623; }
      code { background: #eef6e8; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>GSTN Regulatory Portal (Mock)</h1>
    <div class="note">This is a mock portal for RegGraph AI demo. Edit the regulation data below to trigger IRDA change detection.</div>
    <p id="meta"></p>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Title</th><th>Category</th><th>Value</th><th>Unit</th><th>Effective Date</th><th>State</th><th>Applies To</th><th>Description</th>
        </tr>
      </thead>
      <tbody id="reg-body"></tbody>
    </table>

    <!-- ═══════════════════════════════════════════════════════════════
         REGULATION DATA — Edit this block to change regulations.
         The IRDA agent scrapes this page and extracts this JSON.
         ═══════════════════════════════════════════════════════════════ -->
    <script type="application/json" id="regulations-data">
{
  "portal": "GSTN Regulatory Portal",
  "version": "1.2.0",
  "last_updated": "2026-05-09T00:00:00Z",
  "regulations": [
    {
      "id": "GST_LATE_FEE_001",
      "title": "GSTR-3B Maximum Late Fee Cap",
      "category": "late_fee",
      "value": 250,
      "unit": "INR_PER_DAY",
      "description": "Maximum late fee for delayed GSTR-3B filing capped at ₹250/day subject to a maximum of ₹5000.",
      "effective_date": "2026-05-01",
      "applies_to": ["GST_REGISTERED"],
      "state": "ALL"
    },
    {
      "id": "GST_ITC_MATCHING_002",
      "title": "ITC Claim Tolerance Limit",
      "category": "compliance_rule",
      "value": 5,
      "unit": "PERCENT",
      "description": "Input Tax Credit (ITC) claim restricted to 5% of eligible credit available in GSTR-2B.",
      "effective_date": "2026-04-01",
      "applies_to": ["GST_REGISTERED"],
      "state": "ALL"
    },
    {
      "id": "GST_SLAB_STANDARD_001",
      "title": "Standard GST Rate",
      "category": "tax_slab",
      "value": 18,
      "unit": "PERCENT",
      "description": "Standard GST rate applicable to services and general goods.",
      "effective_date": "2017-07-01",
      "applies_to": ["GST_REGISTERED"],
      "state": "ALL"
    },
    {
      "id": "GST_THRESHOLD_001",
      "title": "GST Registration Turnover Threshold",
      "category": "threshold",
      "value": 2000000,
      "unit": "INR",
      "description": "Annual turnover above which GST registration becomes mandatory for service providers.",
      "effective_date": "2019-04-01",
      "applies_to": ["ALL_BUSINESSES"],
      "state": "ALL"
    }
  ]
}
    </script>

    <script>
      // Render the table from embedded regulation data
      const data = JSON.parse(document.getElementById("regulations-data").textContent);
      document.getElementById("meta").innerHTML =
        "Version: <code>" + data.version + "</code> | Last Updated: <code>" + data.last_updated + "</code>";
      const body = document.getElementById("reg-body");
      data.regulations.forEach((reg) => {
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + reg.id + "</td><td>" + reg.title + "</td><td>" + reg.category +
          "</td><td>" + reg.value + "</td><td>" + reg.unit + "</td><td>" + reg.effective_date +
          "</td><td>" + reg.state + "</td><td>" + reg.applies_to.join(", ") +
          "</td><td>" + reg.description + "</td>";
        body.appendChild(tr);
      });
    </script>
  </body>
</html>
